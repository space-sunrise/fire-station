- type: entity
  id: ScpBaseComputer
  abstract: true
  components:
  - type: Construction
    graph: ScpComputer
  - type: Sprite
    sprite: _Scp/Structures/Machines/computers.rsi
  - type: AmbientOnPowered
  - type: AmbientSound
    volume: -3
    enabled: false
    sound:
      path: /Audio/_Scp/Ambience/Machines/Consoles/ost1.ogg
      params:
        maxDistance: 2
        variation: 0.25
  - type: EdgeConnection
    connectionKey: computers
    allowedDirections: East, West
  - type: GenericVisualizer
    visuals:
      enum.ComputerVisuals.Powered:
        computerLayerScreen:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
      enum.WiresVisuals.MaintenancePanelState:
        enum.WiresVisualLayers.MaintenancePanel:
          True: { visible: false }
          False: { visible: true }
      enum.EdgeConnectionVisuals.ConnectionMask:
        computerLayerBody:
          None: { state: computer, sprite: _Scp/Structures/Machines/computers.rsi }
          West: { state: computer_right, sprite: _Scp/Structures/Machines/computers_big.rsi }
          East: { state: computer_left, sprite: _Scp/Structures/Machines/computers_big.rsi }
          East, West: { state: computer_middle, sprite: _Scp/Structures/Machines/computers_big.rsi }

- type: entity
  id: ScpComputerAlert
  parent:
  - ScpBaseComputer
  - ComputerAlert
  components:
  - type: GenericVisualizer
    visuals:
      enum.ComputerVisuals.Powered:
        computerLayerScreen:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
      enum.AtmosAlertsComputerVisuals.ComputerLayerScreen:
        computerLayerScreen:
          0: { state: alert-0 }
          1: { state: alert-0 }
          2: { state: alert-1 }
          3: { state: alert-2 }
          4: { state: alert-2 }
      enum.WiresVisuals.MaintenancePanelState:
        enum.WiresVisualLayers.MaintenancePanel:
          True: { visible: false }
          False: { visible: true }
      enum.EdgeConnectionVisuals.ConnectionMask:
        computerLayerBody:
          None: { state: computer, sprite: _Scp/Structures/Machines/computers.rsi }
          West: { state: computer_right, sprite: _Scp/Structures/Machines/computers_big.rsi }
          East: { state: computer_left, sprite: _Scp/Structures/Machines/computers_big.rsi }
          East, West: { state: computer_middle, sprite: _Scp/Structures/Machines/computers_big.rsi }

