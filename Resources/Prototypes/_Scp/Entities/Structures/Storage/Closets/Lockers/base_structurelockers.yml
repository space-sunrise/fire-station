- type: entity
  id: ScpLockerBase
  parent: [ ScpClosetBase, LockerBase ]
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: generic
      map: ["enum.StorageVisualLayers.Base"]
    - state: generic_door
      map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: paper
      visible: false
      sprite: Structures/Storage/closet_labels.rsi
      offset: "-0.065,0"
      map: ["enum.PaperLabelVisuals.Layer"]

- type: entity
  id: ScpLockerBaseSecure
  parent: [ ScpLockerBase, LockerBaseSecure ]
  abstract: true

